name: the-observatory CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test --if-present
      - name: Compliance Ping
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST $LUMINOUS_REGISTRY_URL/registry \
            -H "Content-Type: application/json" \
            -d '{"service":"the-observatory","status":"CI_PASSED"}'
        env:
          LUMINOUS_REGISTRY_URL: ${{ secrets.LUMINOUS_REGISTRY_URL }}
        continue-on-error: true
